<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Application Dashboard{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gradient-dark text-light">
    <!-- Background Abstract Shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <nav class="navbar navbar-expand-lg glass-navbar mb-5">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2 brand-text" href="/">
                <i class="fa-solid fa-briefcase text-primary-gradient"></i> Target.Acquired
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <a class="nav-link active" href="/"><i class="fa-solid fa-chart-pie me-1"></i> Board</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-primary btn-glow" onclick="refreshData()" id="refreshBtn">
                            <i class="fa-solid fa-rotate me-2"></i>Sync Data
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4 content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-4 mt-5 mb-3">
        <div class="glass-footer">
            <p class="mb-0 text-muted-custom">
                <i class="fa-solid fa-satellite-dish me-2"></i>Signal Last Received: <span id="lastUpdate" class="text-light fw-bold">Just now</span>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
